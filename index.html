<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsetScan — Manajemen Aset & Riwayat Perawatan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap');

  :root{
    --bg: #16181d;
    --bg-raised: #1f2229;
    --card: #f6f4ee;
    --ink: #17181c;
    --ink-dim: #6b6f76;
    --line: #33363f;
    --amber: #ff8a1e;
    --green: #48b96b;
    --red: #e05c4c;
    --indigo: #7c8bd6;
    --mono: 'IBM Plex Mono', monospace;
    --cond: 'Barlow Condensed', sans-serif;
    --sans: 'Barlow', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--bg); color: var(--card); font-family: var(--sans); min-height:100vh;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 2px, transparent 2px, transparent 14px);
  }
  .app{ max-width: 640px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  header.top{ padding: 22px 20px 16px; border-bottom: 1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{ width:34px; height:34px; border-radius:6px; background: var(--amber); display:flex; align-items:center; justify-content:center; color:#16181d; font-family: var(--mono); font-weight:700; font-size:15px; }
  .brand-name{ font-family: var(--cond); font-weight:800; font-size:22px; letter-spacing:0.5px; }
  .brand-sub{ font-family: var(--mono); font-size:9.5px; color: var(--ink-dim); letter-spacing:1px; text-transform:uppercase; }

  nav.tabs{ display:flex; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:10; }
  .tab{ flex:1; text-align:center; padding:13px 8px; font-family:var(--cond); font-weight:700; font-size:16px; letter-spacing:0.5px; color:var(--ink-dim); cursor:pointer; border-bottom:3px solid transparent; transition: all .15s; background:none; border-top:none; border-left:none; border-right:none; }
  .tab.active{ color: var(--amber); border-bottom-color: var(--amber); }
  .tab:hover:not(.active){ color: var(--card); }

  main{ flex:1; padding: 20px 18px 60px; }
  .view{ display:none; }
  .view.active{ display:block; animation: fadein .25s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .scan-frame{ position:relative; background:var(--bg-raised); border:1px solid var(--line); border-radius:10px; aspect-ratio: 1/1; max-height: 340px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #reader{ width:100%; }
  .scan-placeholder{ text-align:center; color:var(--ink-dim); padding:20px; }
  .scan-placeholder svg{ width:52px; height:52px; margin-bottom:10px; opacity:.6; }
  .corner{ position:absolute; width:26px; height:26px; border-color: var(--amber); pointer-events:none; z-index:5; }
  .c-tl{ top:10px; left:10px; border-top:3px solid; border-left:3px solid; }
  .c-tr{ top:10px; right:10px; border-top:3px solid; border-right:3px solid; }
  .c-bl{ bottom:10px; left:10px; border-bottom:3px solid; border-left:3px solid; }
  .c-br{ bottom:10px; right:10px; border-bottom:3px solid; border-right:3px solid; }

  .btn{ font-family: var(--cond); font-weight:700; font-size:17px; letter-spacing:0.4px; padding:13px 20px; border-radius:7px; border:none; cursor:pointer; width:100%; transition: transform .1s, opacity .15s; }
  .btn:active{ transform: scale(0.98); }
  .btn-amber{ background: var(--amber); color:#17181c; }
  .btn-amber:hover{ opacity:.92; }
  .btn-outline{ background:transparent; color:var(--card); border:1.5px solid var(--line); }
  .btn-outline:hover{ border-color: var(--amber); color:var(--amber); }
  .btn-sm{ padding:9px 14px; font-size:14px; width:auto; }

  .scan-actions{ margin-top:14px; display:flex; flex-direction:column; gap:10px; }
  .manual-row{ display:flex; gap:8px; margin-top:14px; }
  .manual-row input{ flex:1; }

  input, select, textarea{ background: var(--bg-raised); border:1px solid var(--line); color:var(--card); padding:11px 12px; border-radius:7px; font-family:var(--sans); font-size:14px; width:100%; outline:none; }
  textarea{ resize:vertical; min-height:64px; }
  input:focus, select:focus, textarea:focus{ border-color: var(--amber); }
  input::placeholder, textarea::placeholder{ color: var(--ink-dim); }
  label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-dim); display:block; margin-bottom:5px; margin-top:12px; }
  label:first-child{ margin-top:0; }

  .section-title{ font-family:var(--cond); font-weight:800; font-size:20px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
  .count-pill{ font-family:var(--mono); font-size:11px; background:var(--bg-raised); border:1px solid var(--line); padding:3px 9px; border-radius:20px; color:var(--ink-dim); }

  /* ASSET LIST */
  .asset-card{ background: var(--card); color: var(--ink); border-radius:9px; padding:14px; margin-bottom:10px; border-left: 4px solid var(--amber); }
  .asset-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .asset-name{ font-weight:700; font-size:15.5px; }
  .asset-sub{ font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); margin-top:2px; }
  .asset-icons{ display:flex; gap:6px; flex-shrink:0; }
  .icon-btn{ background:none; border:1.5px solid #d9d5c8; color:var(--ink-dim); border-radius:6px; padding:6px 8px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .icon-btn:hover{ border-color: var(--amber); color: var(--amber); }
  .icon-btn svg{ width:15px; height:15px; }
  .asset-meta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .tag{ font-family:var(--mono); font-size:10.5px; padding:4px 9px; border-radius:20px; }
  .tag-loc{ background:#e6e7fa; color:#4b4fa0; }
  .tag-loc svg{ width:10px; height:10px; margin-right:3px; vertical-align:-1px; }
  .tag-last{ background:#d7f0dd; color:#1f6b38; }
  .tag-last.none{ background:#f2e6d9; color:#9a5a10; }

  .fab-add{ margin-top:6px; }

  /* SERVICE TICKET */
  .svc-ticket{ background: var(--card); color: var(--ink); border-radius:8px; padding:0; margin-bottom:12px; position:relative; overflow:hidden; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .svc-top{ padding:13px 14px 10px; }
  .svc-strip{ position:absolute; left:0; top:0; bottom:0; width:5px; background: var(--indigo); }
  .status-badge{ display:inline-block; font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; padding:3px 8px; border-radius:4px; }
  .status-badge.selesai{ background:#d7f0dd; color:#1f6b38; }
  .status-badge.proses{ background:#fde3c8; color:#8a4a10; }
  .svc-type{ display:inline-block; font-family:var(--mono); font-size:10px; color:#5a5ea3; background:#e6e7fa; padding:3px 8px; border-radius:4px; margin-bottom:7px; margin-right:5px; }
  .svc-item{ font-weight:700; font-size:15.5px; margin-top:6px; }
  .svc-loc{ font-family:var(--mono); font-size:11px; color:var(--ink-dim); margin-top:1px; }
  .svc-desc{ font-size:13px; color:var(--ink-dim); margin-top:4px; line-height:1.4; }
  .svc-perf{ border-top: 1px dashed #c9c5b8; padding:9px 14px; display:flex; justify-content:space-between; font-family:var(--mono); font-size:11.5px; color:var(--ink-dim); }
  .svc-perf b{ color:var(--ink); font-weight:600; }

  .mini-history{ background:#fff; border:1px solid #e4e0d3; border-radius:8px; padding:10px 12px; margin-top:6px; max-height:220px; overflow-y:auto; }
  .mini-history .mh-row{ padding:8px 0; border-bottom:1px solid #f0ede2; font-size:12.5px; }
  .mini-history .mh-row:last-child{ border-bottom:none; }
  .mini-history .mh-top{ display:flex; justify-content:space-between; align-items:center; font-weight:600; color:var(--ink); gap:8px; }
  .mini-history .mh-date{ font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); white-space:nowrap; }
  .mini-history .mh-desc{ color:var(--ink-dim); font-size:12px; margin-top:2px; }
  .mini-history .mh-empty{ color:var(--ink-dim); font-size:12.5px; text-align:center; padding:8px 0; }

  .asset-detail-box{ background:#fff; border:1px solid #e4e0d3; border-radius:8px; padding:12px 14px; margin-top:6px; }
  .asset-detail-box .dl-row{ display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
  .asset-detail-box .dl-row span:first-child{ color:var(--ink-dim); }
  .asset-detail-box .dl-row span:last-child{ font-weight:600; color:var(--ink); }

  .code-input-row{ display:flex; gap:8px; }
  .code-input-row input{ flex:1; }
  .btn-gen{ background: var(--bg-raised); border:1px solid var(--line); color:var(--card); font-family:var(--mono); font-size:11px; padding:0 12px; border-radius:7px; cursor:pointer; white-space:nowrap; }
  .btn-gen:hover{ border-color: var(--amber); color: var(--amber); }

  .barcode-preview{ background:#fff; border-radius:8px; padding:16px 10px; text-align:center; margin-top:14px; border:1px solid #e4e0d3; }
  .barcode-preview svg{ max-width:100%; }
  .barcode-preview .bp-name{ font-family:var(--sans); font-weight:700; font-size:14px; color:#17181c; margin-top:2px; }

  .action-toggle{ display:flex; gap:8px; margin-top:6px; }
  .action-toggle button{ flex:1; padding:11px; border-radius:7px; border:1.5px solid #d9d5c8; background:#fff; color:var(--ink); font-family:var(--cond); font-weight:700; font-size:15px; cursor:pointer; }
  .action-toggle button.selected{ border-color: var(--amber); }

  .modal-actions{ margin-top:20px; display:flex; flex-direction:column; gap:10px; }
  .stock-hint{ font-family:var(--mono); font-size:12px; color:var(--ink-dim); margin-top:5px; }

  .empty{ text-align:center; padding:50px 20px; color:var(--ink-dim); }
  .empty svg{ width:44px; height:44px; margin-bottom:12px; opacity:.4; }
  .empty p{ font-family:var(--mono); font-size:12.5px; }

  .overlay{ position:fixed; inset:0; background:rgba(10,11,13,0.72); z-index:100; display:none; align-items:flex-end; justify-content:center; }
  .overlay.active{ display:flex; }
  .modal{ background: var(--card); color:var(--ink); width:100%; max-width:640px; border-radius:16px 16px 0 0; padding:22px 20px 26px; max-height:88vh; overflow-y:auto; animation: slideup .22s ease; }
  @keyframes slideup{ from{ transform:translateY(30px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .modal-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
  .modal-title{ font-family:var(--cond); font-weight:800; font-size:22px; }
  .modal-close{ background:none; border:none; font-size:22px; color:var(--ink-dim); cursor:pointer; line-height:1; padding:4px; }
  .modal .item-barcode{ font-family:var(--mono); font-size:11px; color:var(--ink-dim); margin-bottom:6px; }
  .modal label{ color:var(--ink-dim); }
  .modal input, .modal select, .modal textarea{ background:#fff; color:var(--ink); border:1px solid #d9d5c8; }

  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background: var(--green); color:#0d1f13; padding:12px 22px; border-radius:8px; font-family:var(--cond); font-weight:700; font-size:15px; z-index:200; transition: transform .3s ease; box-shadow: 0 6px 20px rgba(0,0,0,.3); }
  .toast.show{ transform:translateX(-50%) translateY(0); }
  .toast.err{ background: var(--red); color:#2a0e0a; }

  .shared-note{ font-family:var(--mono); font-size:10.5px; color: var(--ink-dim); text-align:center; margin-top:16px; line-height:1.6; }

  #printArea{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{ display:block; position:absolute; top:0; left:0; width:100%; background:#fff; }
    .label-grid{ display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; padding:10px; }
    .label-tile{ border:1px dashed #999; border-radius:4px; padding:10px 8px; text-align:center; break-inside: avoid; }
    .label-tile svg{ max-width:100%; }
    .label-tile .lt-name{ font-family:sans-serif; font-weight:700; font-size:13px; color:#000; margin-top:2px; }
    .label-tile .lt-code{ font-family:monospace; font-size:10px; color:#333; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">▮▯▮</div>
      <div>
        <div class="brand-name">AsetScan</div>
        <div class="brand-sub">Aset · Lokasi · Riwayat Perawatan</div>
      </div>
    </div>
    <span class="count-pill" id="assetCountPill">0 aset</span>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="scan">Scan</button>
    <button class="tab" data-view="asset">Aset</button>
    <button class="tab" data-view="service">Servis</button>
  </nav>

  <main>
    <!-- SCAN VIEW -->
    <section class="view active" id="view-scan">
      <div class="scan-frame" id="scanFrame">
        <div class="corner c-tl"></div><div class="corner c-tr"></div>
        <div class="corner c-bl"></div><div class="corner c-br"></div>
        <div id="reader"></div>
        <div class="scan-placeholder" id="scanPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3zM20 14v7M14 20h4"/></svg>
          <div>Kamera belum aktif</div>
        </div>
      </div>
      <div class="scan-actions">
        <button class="btn btn-amber" id="btnStartScan">Mulai Scan Barcode Aset</button>
        <button class="btn btn-outline" id="btnStopScan" style="display:none;">Hentikan Kamera</button>
      </div>
      <div class="manual-row">
        <input type="text" id="manualBarcode" placeholder="atau ketik kode barcode manual…">
        <button class="btn btn-outline btn-sm" id="btnManualGo">Cari</button>
      </div>
      <p class="shared-note">Scan barcode di badan aset untuk melihat jenis, lokasi, dan riwayat perawatan terakhirnya. Data tersimpan dan terlihat oleh semua pengguna aplikasi ini.</p>
    </section>

    <!-- ASSET VIEW -->
    <section class="view" id="view-asset">
      <div class="section-title">Daftar Aset <span class="count-pill" id="astCountPill">0</span></div>
      <div id="assetList"></div>
      <button class="btn btn-outline fab-add" id="btnAddAsset">+ Daftarkan Aset Baru</button>
    </section>

    <!-- SERVICE VIEW -->
    <section class="view" id="view-service">
      <div class="section-title">Riwayat Servis &amp; Perawatan <span class="count-pill" id="svcCountPill">0</span></div>
      <div id="serviceList"></div>
      <button class="btn btn-outline fab-add" id="btnAddServiceMain">+ Catat Servis Baru</button>
    </section>
  </main>
</div>

<div class="overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>
<div id="printArea"><div class="label-grid" id="labelGrid"></div></div>

<script>
(function(){
  const K_AST = 'asetscan:assets';
  const K_SVC = 'asetscan:service';
  let assets = [];
  let serviceEntries = [];
  let html5QrCode = null;
  let scanning = false;

  const seedAssets = [
    { barcode:'AC-0001', name:'AC Split 1PK', jenis:'AC Split', lokasi:'Ruang Server Lt.2' },
    { barcode:'AC-0002', name:'AC Split 2PK', jenis:'AC Split', lokasi:'Ruang Meeting Lt.3' },
    { barcode:'AC-0003', name:'AC Cassette 3PK', jenis:'AC Cassette', lokasi:'Lobby Utama Lt.1' },
    { barcode:'AC-0004', name:'AC Split 1PK', jenis:'AC Split', lokasi:'Ruang HRD Lt.2' },
  ];
  const seedService = [
    { id:'seed1', barcode:'AC-0001', itemName:'AC Split 1PK', svcType:'Servis Rutin', technician:'Budi (Teknisi Internal)', description:'Cleaning unit indoor & outdoor, cek tekanan freon normal', status:'Selesai', ts:new Date(Date.now()-1000*60*60*24*30).toISOString() },
    { id:'seed2', barcode:'AC-0003', itemName:'AC Cassette 3PK', svcType:'Perbaikan', technician:'CV Sejuk Abadi', description:'Ganti kapasitor kompresor, unit sempat mati total', status:'Selesai', ts:new Date(Date.now()-1000*60*60*24*10).toISOString() },
  ];

  function toast(msg, isErr){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(()=> t.classList.remove('show'), 2400);
  }

  async function loadData(){
    try{
      const r = await window.storage.get(K_AST, true);
      assets = r ? JSON.parse(r.value) : null;
    }catch(e){ assets = null; }
    if(!assets){ assets = seedAssets; await saveAssets(); }
    try{
      const r = await window.storage.get(K_SVC, true);
      serviceEntries = r ? JSON.parse(r.value) : null;
    }catch(e){ serviceEntries = null; }
    if(!serviceEntries){ serviceEntries = seedService; await saveService(); }
    renderAssets(); renderServiceList();
  }
  async function saveAssets(){
    try{ await window.storage.set(K_AST, JSON.stringify(assets), true); }
    catch(e){ toast('Gagal menyimpan data aset', true); }
  }
  async function saveService(){
    try{ await window.storage.set(K_SVC, JSON.stringify(serviceEntries), true); }
    catch(e){ toast('Gagal menyimpan riwayat servis', true); }
  }

  // TABS
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('view-'+tab.dataset.view).classList.add('active');
      if(tab.dataset.view !== 'scan' && scanning) stopScan();
    });
  });

  // SCANNING
  document.getElementById('btnStartScan').addEventListener('click', startScan);
  document.getElementById('btnStopScan').addEventListener('click', stopScan);

  function startScan(){
    document.getElementById('scanPlaceholder').style.display = 'none';
    document.getElementById('btnStartScan').style.display = 'none';
    document.getElementById('btnStopScan').style.display = 'block';
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 220, height: 220 } };
    html5QrCode.start({ facingMode: "environment" }, config,
      (decodedText)=>{ onBarcodeDetected(decodedText); }, ()=>{}
    ).then(()=>{ scanning = true; })
    .catch(()=>{ toast('Tidak bisa akses kamera. Cek izin kamera browser.', true); resetScanUI(); });
  }
  function stopScan(){
    if(html5QrCode && scanning){ html5QrCode.stop().then(()=>{ html5QrCode.clear(); resetScanUI(); }).catch(()=>resetScanUI()); }
    else resetScanUI();
  }
  function resetScanUI(){
    scanning = false;
    document.getElementById('scanPlaceholder').style.display = 'block';
    document.getElementById('btnStartScan').style.display = 'block';
    document.getElementById('btnStopScan').style.display = 'none';
  }
  document.getElementById('btnManualGo').addEventListener('click', ()=>{
    const val = document.getElementById('manualBarcode').value.trim();
    if(val) onBarcodeDetected(val);
  });
  document.getElementById('manualBarcode').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') document.getElementById('btnManualGo').click(); });

  function onBarcodeDetected(code){
    if(scanning) stopScan();
    const asset = assets.find(a => a.barcode === code);
    if(asset) openAssetModal(asset); else openNewAssetModal(code, true);
  }

  // MODALS
  const overlay = document.getElementById('modalOverlay');
  const modalContent = document.getElementById('modalContent');
  function closeModal(){ overlay.classList.remove('active'); modalContent.innerHTML=''; }
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeModal(); });

  function lastServiceFor(barcode){
    const list = serviceEntries.filter(s => s.barcode === barcode);
    if(list.length === 0) return null;
    return list.slice().sort((a,b)=> new Date(b.ts) - new Date(a.ts))[0];
  }

  // Scan result: full asset detail + full service history (no keluar/masuk transaction)
  function openAssetModal(asset){
    modalContent.innerHTML = `
      <div class="modal-head">
        <div class="modal-title">${escapeHtml(asset.name)}</div>
        <button class="modal-close" id="mClose">&times;</button>
      </div>
      <div class="item-barcode">${escapeHtml(asset.barcode)}</div>

      <div class="asset-detail-box">
        <div class="dl-row"><span>Jenis</span><span>${escapeHtml(asset.jenis)}</span></div>
        <div class="dl-row"><span>Lokasi</span><span>${escapeHtml(asset.lokasi)}</span></div>
      </div>

      <label>Riwayat Servis / Perawatan</label>
      <div class="mini-history" id="mMiniHistory">${renderMiniHistory(asset.barcode)}</div>

      <div class="modal-actions">
        <button class="btn btn-amber" id="mAddService">+ Catat Servis / Perawatan</button>
        <button class="btn btn-outline" id="mEditAsset">Ubah Jenis / Lokasi</button>
      </div>
    `;
    overlay.classList.add('active');
    document.getElementById('mClose').addEventListener('click', closeModal);
    document.getElementById('mAddService').addEventListener('click', ()=> openServiceModal(asset));
    document.getElementById('mEditAsset').addEventListener('click', ()=> openEditAssetModal(asset));
  }

  function renderMiniHistory(barcode){
    const records = serviceEntries.filter(s => s.barcode === barcode).slice().sort((a,b)=> new Date(b.ts)-new Date(a.ts));
    if(records.length === 0) return '<div class="mh-empty">Belum ada riwayat servis untuk aset ini</div>';
    return records.map(r => {
      const d = new Date(r.ts);
      const dateStr = d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
      return `<div class="mh-row">
        <div class="mh-top"><span>${escapeHtml(r.svcType)}</span><span class="mh-date">${dateStr}</span></div>
        <div class="mh-desc">${escapeHtml(r.description || '-')} · ${escapeHtml(r.technician || '-')}</div>
      </div>`;
    }).join('');
  }

  function openServiceModal(asset){
    const today = new Date().toISOString().slice(0,10);
    modalContent.innerHTML = `
      <div class="modal-head">
        <div class="modal-title">Catat Servis / Perawatan</div>
        <button class="modal-close" id="mClose">&times;</button>
      </div>
      <div class="item-barcode">${escapeHtml(asset.name)} · ${escapeHtml(asset.barcode)} · ${escapeHtml(asset.lokasi)}</div>

      <label>Jenis Kegiatan</label>
      <select id="sType">
        <option>Cleaning Outdoor</option>
        <option>Cleaning Indoor</option>
        <option>Servis Rutin</option>
        <option>Perbaikan</option>
        <option>Kalibrasi</option>
        <option>Penggantian Sparepart</option>
        <option>Lainnya</option>
      </select>

      <label>Tanggal</label>
      <input type="date" id="sDate" value="${today}">

      <label>Teknisi / Vendor</label>
      <input type="text" id="sTech" placeholder="Nama teknisi atau vendor">

      <label>Deskripsi Pekerjaan</label>
      <textarea id="sDesc" placeholder="Contoh: cleaning outdoor, cek tekanan freon..."></textarea>

      <label>Status</label>
      <div class="action-toggle">
        <button type="button" class="selected" data-st="Selesai">Selesai</button>
        <button type="button" data-st="Dalam Proses">Dalam Proses</button>
      </div>

      <div class="modal-actions">
        <button class="btn btn-amber" id="sSubmit">Simpan Riwayat</button>
        <button class="btn btn-outline" id="mCancel">Batal</button>
      </div>
    `;
    overlay.classList.add('active');
    let selectedStatus = 'Selesai';
    document.getElementById('mClose').addEventListener('click', closeModal);
    document.getElementById('mCancel').addEventListener('click', closeModal);
    modalContent.querySelectorAll('.action-toggle button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        selectedStatus = btn.dataset.st;
        modalContent.querySelectorAll('.action-toggle button').forEach(b=> b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
    document.getElementById('sSubmit').addEventListener('click', async ()=>{
      const svcType = document.getElementById('sType').value;
      const date = document.getElementById('sDate').value || today;
      const technician = document.getElementById('sTech').value.trim();
      const description = document.getElementById('sDesc').value.trim();
      if(!technician){ toast('Isi nama teknisi/vendor dulu', true); return; }
      serviceEntries.unshift({
        id: Date.now().toString(36), barcode: asset.barcode, itemName: asset.name,
        svcType, technician, description, status: selectedStatus, ts: new Date(date).toISOString()
      });
      await saveService();
      renderServiceList(); renderAssets();
      toast('Riwayat servis tersimpan');
      closeModal();
    });
  }

  function openEditAssetModal(asset){
    modalContent.innerHTML = `
      <div class="modal-head">
        <div class="modal-title">Ubah Data Aset</div>
        <button class="modal-close" id="mClose">&times;</button>
      </div>
      <div class="item-barcode">${escapeHtml(asset.barcode)}</div>
      <label>Nama Aset</label>
      <input type="text" id="eName" value="${escapeHtml(asset.name)}">
      <label>Jenis</label>
      <input type="text" id="eJenis" value="${escapeHtml(asset.jenis)}">
      <label>Lokasi</label>
      <input type="text" id="eLokasi" value="${escapeHtml(asset.lokasi)}">
      <div class="modal-actions">
        <button class="btn btn-amber" id="eSubmit">Simpan Perubahan</button>
        <button class="btn btn-outline" id="mCancel">Batal</button>
      </div>
    `;
    overlay.classList.add('active');
    document.getElementById('mClose').addEventListener('click', closeModal);
    document.getElementById('mCancel').addEventListener('click', closeModal);
    document.getElementById('eSubmit').addEventListener('click', async ()=>{
      asset.name = document.getElementById('eName').value.trim() || asset.name;
      asset.jenis = document.getElementById('eJenis').value.trim() || asset.jenis;
      asset.lokasi = document.getElementById('eLokasi').value.trim() || asset.lokasi;
      await saveAssets();
      renderAssets();
      toast('Data aset diperbarui');
      closeModal();
    });
  }

  function generateInternalCode(){
    const rand = Math.floor(1000 + Math.random()*9000);
    return 'AST' + Date.now().toString(36).toUpperCase().slice(-5) + rand;
  }

  function openNewAssetModal(code, fromScan){
    modalContent.innerHTML = `
      <div class="modal-head">
        <div class="modal-title">Aset Belum Terdaftar</div>
        <button class="modal-close" id="mClose">&times;</button>
      </div>
      <label>Nama Aset</label>
      <input type="text" id="nName" placeholder="Contoh: AC Split 1PK">
      <label>Jenis</label>
      <input type="text" id="nJenis" placeholder="Contoh: AC Split / AC Cassette">
      <label>Lokasi</label>
      <input type="text" id="nLokasi" placeholder="Contoh: Ruang Server Lt.2">
      <label>Kode Barcode</label>
      <div class="code-input-row">
        <input type="text" id="nCode" value="${escapeHtml(code)}" ${fromScan ? 'readonly' : ''}>
        ${fromScan ? '' : '<button type="button" class="btn-gen" id="nGenCode">Generate</button>'}
      </div>
      <div class="stock-hint">${fromScan ? 'Kode ini terbaca dari hasil scan kamera.' : 'Kosongkan lalu klik Generate untuk kode internal otomatis, atau isi manual kalau aset sudah punya nomor sendiri.'}</div>
      <div class="modal-actions">
        <button class="btn btn-amber" id="nSubmit">Simpan Aset</button>
        <button class="btn btn-outline" id="mCancel">Batal</button>
      </div>
    `;
    overlay.classList.add('active');
    document.getElementById('mClose').addEventListener('click', closeModal);
    document.getElementById('mCancel').addEventListener('click', closeModal);
    const genBtn = document.getElementById('nGenCode');
    if(genBtn) genBtn.addEventListener('click', ()=>{ document.getElementById('nCode').value = generateInternalCode(); });
    document.getElementById('nSubmit').addEventListener('click', async ()=>{
      const name = document.getElementById('nName').value.trim();
      const jenis = document.getElementById('nJenis').value.trim() || 'Umum';
      const lokasi = document.getElementById('nLokasi').value.trim() || '-';
      let finalCode = document.getElementById('nCode').value.trim();
      if(!name){ toast('Isi nama aset dulu', true); return; }
      if(!finalCode) finalCode = generateInternalCode();
      if(assets.some(a => a.barcode === finalCode)){ toast('Kode barcode sudah dipakai aset lain', true); return; }
      const newAsset = { barcode: finalCode, name, jenis, lokasi };
      assets.push(newAsset);
      await saveAssets();
      renderAssets();
      closeModal();
      toast('Aset baru terdaftar: ' + name);
      openPrintModal(newAsset);
    });
  }

  document.getElementById('btnAddAsset').addEventListener('click', ()=>{
    openNewAssetModal(generateInternalCode(), false);
  });

  function openPrintModal(asset){
    modalContent.innerHTML = `
      <div class="modal-head">
        <div class="modal-title">Cetak Label Barcode</div>
        <button class="modal-close" id="mClose">&times;</button>
      </div>
      <div class="item-barcode">${escapeHtml(asset.name)} · ${escapeHtml(asset.lokasi)}</div>
      <div class="barcode-preview">
        <svg id="bcSvgPreview"></svg>
        <div class="bp-name">${escapeHtml(asset.name)}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-amber" id="pPrint">Cetak Label Ini</button>
        <button class="btn btn-outline" id="mCancel">Tutup</button>
      </div>
    `;
    overlay.classList.add('active');
    document.getElementById('mClose').addEventListener('click', closeModal);
    document.getElementById('mCancel').addEventListener('click', closeModal);
    try{ JsBarcode("#bcSvgPreview", asset.barcode, { format:"CODE128", width:2, height:55, fontSize:12, margin:6 }); }catch(e){}
    document.getElementById('pPrint').addEventListener('click', ()=> printLabel(asset));
  }

  function printLabel(asset){
    const grid = document.getElementById('labelGrid');
    grid.innerHTML = `<div class="label-tile"><svg id="lbl-svg-0"></svg><div class="lt-name">${escapeHtml(asset.name)}</div><div class="lt-code">${escapeHtml(asset.barcode)} · ${escapeHtml(asset.lokasi)}</div></div>`;
    try{ JsBarcode('#lbl-svg-0', asset.barcode, { format:"CODE128", width:2, height:50, fontSize:11, margin:4 }); }catch(e){}
    setTimeout(()=> window.print(), 150);
  }

  // RENDER ASSET LIST
  function renderAssets(){
    const list = document.getElementById('assetList');
    document.getElementById('assetCountPill').textContent = assets.length + ' aset';
    document.getElementById('astCountPill').textContent = assets.length;
    if(assets.length === 0){ list.innerHTML = emptyState('Belum ada aset terdaftar'); return; }
    list.innerHTML = assets.map((a, idx) => {
      const last = lastServiceFor(a.barcode);
      const lastLabel = last ? (last.svcType + ' · ' + new Date(last.ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})) : 'Belum pernah diservis';
      return `
      <div class="asset-card">
        <div class="asset-head">
          <div>
            <div class="asset-name">${escapeHtml(a.name)}</div>
            <div class="asset-sub">${escapeHtml(a.barcode)} · ${escapeHtml(a.jenis)}</div>
          </div>
          <div class="asset-icons">
            <button class="icon-btn" data-edit="${idx}" title="Ubah data aset">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
            </button>
            <button class="icon-btn" data-print="${idx}" title="Cetak label barcode">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9V3h12v6M6 18H4a1 1 0 01-1-1v-5a1 1 0 011-1h16a1 1 0 011 1v5a1 1 0 01-1 1h-2M6 14h12v7H6z"/></svg>
            </button>
          </div>
        </div>
        <div class="asset-meta">
          <span class="tag tag-loc">${escapeHtml(a.lokasi)}</span>
          <span class="tag tag-last ${last?'':'none'}">${escapeHtml(lastLabel)}</span>
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('[data-print]').forEach(btn=> btn.addEventListener('click', ()=> openPrintModal(assets[parseInt(btn.dataset.print,10)])));
    list.querySelectorAll('[data-edit]').forEach(btn=> btn.addEventListener('click', ()=> openEditAssetModal(assets[parseInt(btn.dataset.edit,10)])));
  }

  // SERVICE TAB
  function renderServiceList(){
    const list = document.getElementById('serviceList');
    document.getElementById('svcCountPill').textContent = serviceEntries.length;
    if(serviceEntries.length === 0){ list.innerHTML = emptyState('Belum ada riwayat servis / perawatan'); return; }
    const sorted = serviceEntries.slice().sort((a,b)=> new Date(b.ts)-new Date(a.ts));
    list.innerHTML = sorted.map(r => {
      const asset = assets.find(a => a.barcode === r.barcode);
      const d = new Date(r.ts);
      const dateStr = d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
      const isDone = r.status === 'Selesai';
      return `
      <div class="svc-ticket">
        <div class="svc-strip"></div>
        <div class="svc-top">
          <span class="svc-type">${escapeHtml(r.svcType)}</span>
          <span class="status-badge ${isDone?'selesai':'proses'}">${escapeHtml(r.status)}</span>
          <div class="svc-item">${escapeHtml(r.itemName)}</div>
          <div class="svc-loc">${escapeHtml(r.barcode)}${asset ? ' · ' + escapeHtml(asset.lokasi) : ''}</div>
          <div class="svc-desc">${escapeHtml(r.description || 'Tidak ada catatan tambahan')}</div>
        </div>
        <div class="svc-perf">
          <span>Oleh <b>${escapeHtml(r.technician)}</b></span>
          <span>${dateStr}</span>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('btnAddServiceMain').addEventListener('click', ()=>{
    if(assets.length === 0){ toast('Belum ada aset terdaftar', true); return; }
    openItemPickerForService();
  });

  function openItemPickerForService(){
    modalContent.innerHTML = `
      <div class="modal-head">
        <div class="modal-title">Pilih Aset</div>
        <button class="modal-close" id="mClose">&times;</button>
      </div>
      <label>Aset</label>
      <select id="pickItem">
        ${assets.map((a,i)=>`<option value="${i}">${escapeHtml(a.name)} — ${escapeHtml(a.barcode)} (${escapeHtml(a.lokasi)})</option>`).join('')}
      </select>
      <div class="modal-actions">
        <button class="btn btn-amber" id="pickNext">Lanjut</button>
        <button class="btn btn-outline" id="mCancel">Batal</button>
      </div>
    `;
    overlay.classList.add('active');
    document.getElementById('mClose').addEventListener('click', closeModal);
    document.getElementById('mCancel').addEventListener('click', closeModal);
    document.getElementById('pickNext').addEventListener('click', ()=>{
      const idx = parseInt(document.getElementById('pickItem').value, 10);
      openServiceModal(assets[idx]);
    });
  }

  function emptyState(msg){
    return `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8h.01M16 8h.01M8 16h8"/></svg>
      <p>${escapeHtml(msg)}</p>
    </div>`;
  }
  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  loadData();
})();
</script>
</body>
</html>
